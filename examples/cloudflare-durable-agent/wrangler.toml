name = "nominee-durable-agent"
main = "src/index.ts"
compatibility_date = "2026-06-20"
compatibility_flags = ["nodejs_compat"]

# The agent IS a Durable Object: it hibernates between steps and resumes via
# an alarm hours later. A token captured at start would be dead on resume —
# nominee re-resolves a fresh one on every wake.
[[durable_objects.bindings]]
name = "AGENT"
class_name = "ResearchAgent"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["ResearchAgent"]

[vars]
# Your provider's OAuth2 refresh endpoint (any provider — this is the neutral path).
TOKEN_ENDPOINT = "https://github.com/login/oauth/access_token"
